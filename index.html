<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inventario QR - REPORTEC</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        .overflow-y-auto::-webkit-scrollbar { width: 0px; background: transparent; }
    </style>
</head>
<body class="bg-slate-100 font-sans min-h-screen flex flex-col items-center justify-start">

    <div id="loginScreen" class="w-full max-w-md bg-white min-h-screen flex flex-col justify-center items-center px-8 shadow-xl">
        <div class="text-center space-y-3 mb-8">
            <div class="w-16 h-16 bg-purple-100 text-[#6a1b9a] rounded-2xl flex items-center justify-center mx-auto shadow-sm">
                <i class="fa-solid fa-shield-halved text-2xl"></i>
            </div>
            <h2 class="text-2xl font-bold text-slate-800 tracking-tight">Acceso Restringido</h2>
            <p class="text-xs text-slate-400 max-w-[240px] mx-auto">Introduce la clave de seguridad para gestionar el inventario.</p>
        </div>

        <div class="w-full space-y-4">
            <div class="relative">
                <i class="fa-solid fa-lock absolute left-4 top-3.5 text-slate-400 text-sm"></i>
                <input type="password" id="passwordInput" placeholder="Contraseña del sistema" 
                    class="w-full pl-10 pr-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:outline-none focus:border-purple-500 focus:bg-white text-sm text-slate-700 transition-all">
            </div>
            <p id="loginError" class="text-rose-500 text-xs font-medium text-center hidden">Contraseña incorrecta.</p>
            <button onclick="verificarPassword()" class="w-full py-3.5 bg-[#6a1b9a] hover:bg-purple-800 text-white font-bold rounded-xl text-sm transition shadow-md">
                Entrar al Sistema
            </button>
        </div>
    </div>

    <div id="appContainer" class="hidden w-full max-w-md bg-[#f3e8ff] min-h-screen flex flex-col relative shadow-xl overflow-hidden pb-16">
        <header class="bg-[#6a1b9a] text-white p-4 flex justify-between items-center shadow-md">
            <div class="flex items-center space-x-3">
                <i class="fa-solid fa-bars text-lg cursor-pointer"></i>
                <h1 class="text-lg font-bold tracking-wide">Inventario QR</h1>
            </div>
            <div class="flex items-center space-x-4 text-lg">
                <i class="fa-solid fa-mobile-screen-button cursor-pointer"></i>
                <i class="fa-solid fa-print cursor-pointer"></i>
                <i class="fa-solid fa-clipboard-list cursor-pointer"></i>
                <i onclick="openCreateModal()" class="fa-solid fa-plus cursor-pointer font-bold text-xl hover:text-purple-200 transition"></i>
            </div>
        </header>

        <div class="p-4">
            <div class="w-full bg-white rounded-xl shadow-xs border border-purple-200 px-3 py-2 flex items-center space-x-2">
                <i class="fa-solid fa-magnifying-glass text-slate-400 text-sm"></i>
                <input type="text" id="mainSearch" placeholder="Buscar en elementos..." onkeyup="searchInventory()" class="w-full bg-transparent focus:outline-none text-sm text-slate-700">
            </div>
        </div>

        <main class="flex-1 px-4 overflow-y-auto space-y-3" id="inventoryContainer">
            <div class="text-center text-slate-500 pt-10 text-sm">Conectando a la base de datos...</div>
        </main>

        <div id="createModal" class="hidden fixed inset-0 bg-white z-50 flex flex-col max-w-md mx-auto overflow-hidden">
            <div class="bg-[#6a1b9a] text-white p-4 shadow-sm text-center">
                <h2 class="text-lg font-bold tracking-wide">Nuevo Registro de Inventario</h2>
            </div>
            <form id="createForm" onsubmit="event.preventDefault(); submitCreateForm();" class="flex-1 p-5 space-y-4 overflow-y-auto bg-white pb-24">
                
                <div>
                    <label class="block text-sm font-medium text-[#6a1b9a] mb-1">Tipo de Inmobiliario</label>
                    <select id="create_tipo" required class="w-full px-3 py-2 border border-purple-400 rounded-xl text-sm bg-white text-slate-700 focus:outline-none">
                        <option value="" disabled selected>Selecciona un tipo...</option>
                        <option value="Pantalla">Pantalla</option>
                        <option value="Teléfonos">Teléfonos</option>
                        <option value="Sillón">Sillón</option>
                        <option value="Mueble">Mueble</option>
                        <option value="Sillas de ruedas">Sillas de ruedas</option>
                        <option value="Extintores">Extintores</option>
                        <option value="Porta pantalla">Porta pantalla</option>
                        <option value="Impresora">Impresora</option>
                        <option value="PC(cpu y monitor)">PC(cpu y monitor)</option>
                        <option value="Bancas">Bancas</option>
                        <option value="Mesas de jardín">Mesas de jardín</option>
                        <option value="Sillones(alcochonado )">Sillones(alcochonado )</option>
                        <option value="Carritos de servicios color negro.">Carritos de servicios color negro.</option>
                        <option value="carro de servicio de acero inoxidable">carro de servicio de acero inoxidable</option>
                        <option value="Escritorios">Escritorios</option>
                        <option value="Sillas de escritorio">Sillas de escritorio</option>
                        <option value="Carritos de limpieza">Carritos de limpieza</option>
                        <option value="Sillas de urgencias bariátrica">Sillas de urgencias bariátrica</option>
                        <option value="Impresoras para pulseras">Impresoras para pulseras</option>
                        <option value="Ventilador (torre,rueda,)">Ventilador (torre,rueda,)</option>
                        <option value="Despachador de agua(mesa,)">Despachador de agua(mesa,)</option>
                    </select>
                </div>

                <div>
                    <label class="block text-sm font-medium text-[#6a1b9a] mb-1">Descripción</label>
                    <textarea id="create_descripcion" rows="2" class="w-full px-3 py-2 border border-purple-400 rounded-xl text-sm focus:outline-none" placeholder="Detalles..."></textarea>
                </div>
                
                <div>
                    <label class="block text-sm font-medium text-[#6a1b9a] mb-1">Sitio</label>
                    <select id="create_sitio" required class="w-full px-3 py-2 border border-purple-400 rounded-xl text-sm bg-white text-slate-700 focus:outline-none">
                        <option value="Hospital UPAEP">Hospital UPAEP</option>
                        <option value="Centro Medico 1">Centro Medico 1</option>
                        <option value="Centro Medico 2">Centro Medico 2</option>
                    </select>
                </div>

                <div>
                    <label class="block text-sm font-medium text-[#6a1b9a] mb-1">Área</label>
                    <input type="text" id="create_area" required class="w-full px-3 py-2 border border-purple-400 rounded-xl text-sm focus:outline-none">
                </div>

                <div>
                    <label class="block text-sm font-medium text-[#6a1b9a] mb-1">Fecha de Registro</label>
                    <input type="date" id="create_fechaRegistro" required class="w-full px-3 py-2 border border-purple-400 rounded-xl text-sm bg-white text-slate-700 focus:outline-none">
                </div>

                <div>
                    <label class="block text-sm font-medium text-[#6a1b9a] mb-1">Responsable</label>
                    <input type="text" id="create_responsable" required class="w-full px-3 py-2 border border-purple-400 rounded-xl text-sm focus:outline-none">
                </div>
            </form>
            <div class="absolute bottom-0 left-0 right-0 bg-white p-4 border-t border-slate-100 flex space-x-3 z-10">
                <button type="button" onclick="closeCreateModal()" class="flex-1 py-3 bg-slate-100 font-semibold rounded-xl text-sm text-slate-600">Cancelar</button>
                <button type="button" onclick="submitCreateForm()" class="flex-1 py-3 bg-[#6a1b9a] font-bold rounded-xl text-sm text-white shadow-sm">Aceptar</button>
            </div>
        </div>
    </div>

    <div id="detailsModal" class="hidden fixed inset-0 bg-[#f3e8ff] z-50 flex flex-col max-w-md mx-auto overflow-hidden">
        <header class="bg-[#6a1b9a] text-white p-4 flex justify-between items-center shadow-md">
            <div class="flex items-center space-x-3">
                <i onclick="closeDetailsModal()" class="fa-solid fa-arrow-left text-lg cursor-pointer hover:text-purple-200 transition"></i>
                <h1 id="detailsHeaderId" class="text-lg font-bold tracking-wide">INV-0000</h1>
            </div>
            <div class="flex items-center space-x-2">
                <i onclick="eliminarElementoActual()" class="fa-solid fa-trash-can text-lg cursor-pointer hover:text-rose-300 transition p-2"></i>
                <i class="fa-solid fa-pen-to-square text-lg cursor-pointer p-2"></i>
            </div>
        </header>

        <main class="flex-1 p-4 overflow-y-auto space-y-4 pb-12">
            <input type="hidden" id="detailsIdHidden">

            <div class="bg-white p-4 rounded-2xl shadow-xs">
                <label class="block text-[11px] font-bold text-purple-500 uppercase tracking-wider mb-1">Tipo Inmobiliario</label>
                <div id="cardTipo" class="text-slate-800 font-semibold text-[15px]"></div>
            </div>

            <div class="bg-white p-4 rounded-2xl shadow-xs">
                <label class="block text-[11px] font-bold text-purple-500 uppercase tracking-wider mb-1">Descripción</label>
                <div id="cardDescripcion" class="text-slate-700 text-[15px]"></div>
            </div>

            <div class="bg-white p-4 rounded-2xl shadow-xs">
                <label class="block text-[11px] font-bold text-purple-500 uppercase tracking-wider mb-1">Sitio</label>
                <div id="cardSitio" class="text-slate-800 text-[15px]"></div>
            </div>

            <div class="bg-white p-4 rounded-2xl shadow-xs">
                <label class="block text-[11px] font-bold text-purple-500 uppercase tracking-wider mb-1">Área</label>
                <div id="cardArea" class="text-slate-800 text-[15px]"></div>
            </div>

            <div class="bg-white p-4 rounded-2xl shadow-xs">
                <label class="block text-[11px] font-bold text-purple-500 uppercase tracking-wider mb-1">Fecha de Registro</label>
                <div id="cardFecha" class="text-slate-800 text-[15px]"></div>
            </div>

            <div class="bg-white p-4 rounded-2xl shadow-xs">
                <label class="block text-[11px] font-bold text-purple-500 uppercase tracking-wider mb-1">Responsable</label>
                <div id="cardResponsable" class="text-slate-800 text-[15px]"></div>
            </div>

            <div class="bg-white p-5 rounded-2xl shadow-xs flex flex-col items-center justify-center text-center space-y-4">
                <label class="text-[12px] font-bold text-purple-600 uppercase tracking-wider">Código QR de Control</label>
                <div id="qrcodeCanvas" class="p-1 bg-white border border-slate-100 inline-block"></div>
                <p class="text-[11px] text-slate-400 max-w-[240px] leading-normal">
                    Escanea este código para consultar el registro directo en el servidor.
                </p>
            </div>
        </main>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc, getDocs, deleteDoc, doc, query, orderBy } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAPupzT6Tbwsk-Dl--MguyFZhPRJbfh11A",
            authDomain: "inventario-74a4d.firebaseapp.com",
            projectId: "inventario-74a4d",
            storageBucket: "inventario-74a4d.appspot.com",
            messagingSenderId: "109621153626",
            appId: "1:109621153626:web:ad02f208935b9adde8f963"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        let cacheInventario = [];
        let qrcodeGenerator = null;

        window.verificarPassword = function() {
            const pass = document.getElementById('passwordInput').value;
            if(pass === 'REPORTEC2026' || pass === 'admin') {
                document.getElementById('loginScreen').classList.add('hidden');
                document.getElementById('appContainer').classList.remove('hidden');
                cargarDatosFirebase();
            } else {
                document.getElementById('loginError').classList.remove('hidden');
            }
        };

        async function cargarDatosFirebase() {
            try {
                const colRef = collection(db, "elementos");
                const q = query(colRef, orderBy("fechaRegistro", "desc"));
                const querySnapshot = await getDocs(q);
                
                cacheInventario = [];
                let contador = querySnapshot.size;

                querySnapshot.forEach((docSnap) => {
                    let datos = docSnap.data();
                    let numStr = String(contador).padStart(4, '0');
                    let customId = `INV-${numStr}`;
                    
                    cacheInventario.push({
                        id: docSnap.id,
                        codigo: customId,
                        ...datos
                    });
                    contador--;
                });

                renderizarLista(cacheInventario);
            } catch (error) {
                console.error("Error al leer:", error);
            }
        }

        function renderizarLista(items) {
            const container = document.getElementById('inventoryContainer');
            if(items.length === 0) {
                container.innerHTML = '<div class="text-center text-slate-400 pt-10 text-sm">No hay registros guardados.</div>';
                return;
            }

            container.innerHTML = '';
            items.forEach((item) => {
                const card = document.createElement('div');
                card.className = "bg-white p-4 rounded-2xl shadow-xs border border-purple-100/40 relative cursor-pointer active:scale-[0.99] transition-transform";
                card.onclick = () => openDetailsModal(item.id);
                card.innerHTML = `
                    <div class="text-[11px] font-bold text-purple-600 mb-0.5">${item.codigo}</div>
                    <div class="text-base font-bold text-slate-800">${item.tipo || 'Sin Tipo'}</div>
                    <div class="text-xs text-slate-400 mt-0.5">${item.descripcion || ''}</div>
                    <div class="text-xs text-purple-700/80 font-medium mt-2 flex items-center">
                        <i class="fa-solid fa-location-dot mr-1.5 text-[11px]"></i>${item.sitio} - Area ${item.area}
                    </div>
                `;
                container.appendChild(card);
            });
        }

        window.searchInventory = function() {
            const txt = document.getElementById('mainSearch').value.toLowerCase();
            const filtrados = cacheInventario.filter(i => 
                i.codigo.toLowerCase().includes(txt) || 
                (i.tipo && i.tipo.toLowerCase().includes(txt)) || 
                (i.descripcion && i.descripcion.toLowerCase().includes(txt)) ||
                (i.sitio && i.sitio.toLowerCase().includes(txt))
            );
            renderizarLista(filtrados);
        };

        window.openDetailsModal = function(id) {
            const item = cacheInventario.find(i => i.id === id);
            if(!item) return;

            document.getElementById('detailsIdHidden').value = item.id;
            document.getElementById('detailsHeaderId').innerText = item.codigo;
            document.getElementById('cardTipo').innerText = item.tipo || '—';
            document.getElementById('cardDescripcion').innerText = item.descripcion || '—';
            document.getElementById('cardSitio').innerText = item.sitio || '—';
            document.getElementById('cardArea').innerText = item.area || '—';
            
            if(item.fechaRegistro) {
                const parts = item.fechaRegistro.split('-');
                document.getElementById('cardFecha').innerText = parts.length === 3 ? `${parts[2]}/${parts[1]}/${parts[0]}` : item.fechaRegistro;
            } else {
                document.getElementById('cardFecha').innerText = '—';
            }
            
            document.getElementById('cardResponsable').innerText = item.responsable || '—';

            const canvasContainer = document.getElementById('qrcodeCanvas');
            canvasContainer.innerHTML = ''; 
            
            qrcodeGenerator = new QRCode(canvasContainer, {
                text: item.codigo, 
                width: 160,
                height: 160,
                colorDark: "#000000",
                colorLight: "#ffffff",
                correctLevel: QRCode.CorrectLevel.H
            });

            document.getElementById('detailsModal').classList.remove('hidden');
        };

        window.closeDetailsModal = function() {
            document.getElementById('detailsModal').classList.add('hidden');
        };

        window.eliminarElementoActual = async function() {
            const id = document.getElementById('detailsIdHidden').value;
            if(confirm("¿Estás seguro de que deseas eliminar este registro del servidor?")) {
                await deleteDoc(doc(db, "elementos", id));
                closeDetailsModal();
                cargarDatosFirebase();
            }
        };

        window.openCreateModal = function() {
            document.getElementById('create_fechaRegistro').value = new Date().toISOString().split('T')[0];
            document.getElementById('createModal').classList.remove('hidden');
        };
        window.closeCreateModal = function() {
            document.getElementById('createModal').classList.add('hidden');
            document.getElementById('createForm').reset();
        };

        window.submitCreateForm = async function() {
            const tipo = document.getElementById('create_tipo').value;
            const descripcion = document.getElementById('create_descripcion').value;
            const sitio = document.getElementById('create_sitio').value;
            const area = document.getElementById('create_area').value;
            const fechaRegistro = document.getElementById('create_fechaRegistro').value;
            const responsable = document.getElementById('create_responsable').value;

            if(!tipo || !area || !responsable) {
                alert("Por favor rellena los campos requeridos.");
                return;
            }

            try {
                await addDoc(collection(db, "elementos"), {
                    tipo,
                    descripcion,
                    sitio,
                    area,
                    fechaRegistro,
                    responsable
                });
                closeCreateModal();
                cargarDatosFirebase();
            } catch(e) {
                console.error("Error al guardar:", e);
            }
        };
    </script>
</body>
</html>
